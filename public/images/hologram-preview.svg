    <path d="M0 450H1200" stroke="#FF4500" />
    <path d="M0 540H1200" stroke="#FF4500" />
    <path d="M0 630H1200" stroke="#FF4500" />
  </g>

  <g opacity="0.2">
    <path d="M120 0V720" stroke="#00F0FF" />
    <path d="M300 0V720" stroke="#00F0FF" />
    <path d="M480 0V720" stroke="#00F0FF" />
    <path d="M660 0V720" stroke="#00F0FF" />
    <path d="M840 0V720" stroke="#00F0FF" />
    <path d="M1020 0V720" stroke="#00F0FF" />
  </g>

  <g filter="url(#glow)">
    <path d="M640 190C560 205 515 260 520 330C525 415 585 490 640 520C695 490 755 415 760 330C765 260 720 205 640 190Z" fill="#111118" stroke="#FF4500" stroke-width="2" />
    <path d="M640 190C560 205 515 260 520 330C525 415 585 490 640 520C695 490 755 415 760 330C765 260 720 205 640 190Z" stroke="#00F0FF" stroke-width="1" opacity="0.4" />
