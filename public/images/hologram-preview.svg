    <circle cx="760" cy="480" r="6" fill="#FF4500" />
    <circle cx="680" cy="610" r="4" fill="#00F0FF" />
  </g>

  <path d="M420 210L520 330L640 260L760 330L820 220" stroke="#FF4500" stroke-opacity="0.4" />
  <path d="M520 520L640 420L760 480L680 610" stroke="#00F0FF" stroke-opacity="0.35" />

  <rect y="0" width="1200" height="720" fill="url(#scan)" opacity="0.7" />
