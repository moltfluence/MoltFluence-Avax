<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a12" />
      <stop offset="45%" stop-color="#08070c" />
      <stop offset="100%" stop-color="#0a0f18" />
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 360) rotate(90) scale(280 420)">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.45" />
      <stop offset="50%" stop-color="#00F0FF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0" />
      <stop offset="45%" stop-color="#FF4500" stop-opacity="0.08" />
      <stop offset="55%" stop-color="#00F0FF" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bg)" />
  <rect width="1200" height="720" fill="url(#halo)" />

  <g opacity="0.15">
    <path d="M0 90H1200" stroke="#FF4500" />
